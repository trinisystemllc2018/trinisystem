<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <!-- Rounded square background -->
  <rect width="36" height="36" rx="9" fill="#FF4D2E"/>
  <!-- Screen -->
  <rect x="5" y="8" width="22" height="14" rx="2.5" fill="#0d1b2a"/>
  <!-- Code lines -->
  <rect x="7" y="11" width="9" height="2" rx="1" fill="#FF4D2E" opacity="0.9"/>
  <rect x="7" y="14.5" width="7" height="2" rx="1" fill="#38bdf8" opacity="0.8"/>
  <rect x="7" y="18" width="11" height="2" rx="1" fill="#FF4D2E" opacity="0.7"/>
  <!-- Wrench head -->
  <circle cx="24" cy="19" r="6" fill="#ffffff"/>
  <circle cx="24" cy="19" r="3.5" fill="#FF4D2E"/>
  <rect x="21.5" y="12.5" width="2.5" height="4.5" rx="1" fill="#FF4D2E"/>
  <rect x="24" y="12.5" width="2.5" height="4.5" rx="1" fill="#FF4D2E"/>
  <!-- Wrench handle -->
  <rect x="22.5" y="24" width="3" height="8" rx="1.5" fill="#ffffff" transform="rotate(35 24 28)"/>
  <!-- Laptop base -->
  <rect x="3" y="22" width="26" height="3.5" rx="2" fill="#0d1b2a"/>
  <!-- Trackpad -->
  <rect x="14" y="23" width="8" height="2" rx="1" fill="#1a2e44"/>
  <!-- WiFi arc -->
  <circle cx="30" cy="7" r="1.8" fill="#ffffff" opacity="0.95"/>
  <path d="M27 5 Q30 2 33 5" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" opacity="0.75"/>
</svg>
