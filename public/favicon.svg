<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="#FF4D2E"/>
  <!-- Screen -->
  <rect x="4" y="7" width="20" height="13" rx="2" fill="#0d1b2a"/>
  <!-- Code lines on screen -->
  <rect x="6" y="10" width="8" height="1.5" rx="0.75" fill="#FF4D2E" opacity="0.9"/>
  <rect x="6" y="13" width="6" height="1.5" rx="0.75" fill="#38bdf8" opacity="0.8"/>
  <rect x="6" y="16" width="10" height="1.5" rx="0.75" fill="#FF4D2E" opacity="0.7"/>
  <!-- Wrench overlapping bottom-right of screen -->
  <circle cx="21" cy="17" r="5" fill="#ffffff"/>
  <circle cx="21" cy="17" r="3" fill="#FF4D2E"/>
  <rect cx="21" cy="12" width="2.5" height="4" rx="1" x="19.75" y="11" fill="#FF4D2E"/>
  <!-- wrench jaw cuts -->
  <rect x="18.5" y="11" width="2" height="3.5" rx="0.8" fill="#FF4D2E"/>
  <rect x="21.5" y="11" width="2" height="3.5" rx="0.8" fill="#FF4D2E"/>
  <!-- wrench handle -->
  <rect x="20" y="21" width="3" height="7" rx="1.5" fill="#ffffff" transform="rotate(30 21.5 24.5)"/>
  <!-- Laptop base -->
  <rect x="2" y="20" width="24" height="3" rx="1.5" fill="#0d1b2a"/>
  <!-- WiFi dot above -->
  <circle cx="26" cy="6" r="1.5" fill="#ffffff" opacity="0.9"/>
  <path d="M23 4 Q26 1 29 4" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
</svg>
